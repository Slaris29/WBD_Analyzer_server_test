name: Update WBD CSV manifest

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/generate-manifest.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate manifest and bundles
        run: node scripts/generate-manifest.js

      - name: Commit manifest and bundles if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update WBD CSV manifest and bundles'
          file_pattern: |
            data/manifest.json
            data/_bundles/*.json
